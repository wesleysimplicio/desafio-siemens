<div class="page-container">
  <div class="page-header">
    <h1>Géneros</h1>
    <a routerLink="new" class="btn btn-primary">+ Novo Gênero</a>
  </div>

  <div class="alert alert-danger" *ngIf="error$ | async as error">
    {{ error }}
    <button class="btn-close" (click)="dismissError()">✕</button>
  </div>

  <div class="loading" *ngIf="loading$ | async">Carregando...</div>

  <div class="table-wrapper" *ngIf="!(loading$ | async)">
    <table class="data-table" *ngIf="(genres$ | async)?.length; else empty">
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let genre of genres$ | async">
          <td>{{ genre.id }}</td>
          <td>{{ genre.name }}</td>
          <td class="actions">
            <a [routerLink]="[genre.id, 'edit']" class="btn btn-sm btn-secondary">Editar</a>
            <button class="btn btn-sm btn-danger" (click)="onDelete(genre.id)">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>
    <ng-template #empty>
      <p class="empty-state">Nenhum gênero cadastrado.</p>
    </ng-template>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" *ngIf="confirmDeleteId !== null">
  <div class="modal">
    <h3>Confirmar exclusão</h3>
    <p>Deseja excluir este gênero? Esta ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="btn btn-danger" (click)="confirmDelete()">Excluir</button>
      <button class="btn btn-secondary" (click)="cancelDelete()">Cancelar</button>
    </div>
  </div>
</div>
