services:

  db:
    image: postgres:16-alpine
    container_name: bookmanager-db
    environment:
      POSTGRES_DB: bookmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookmanager"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bookmanager-net

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    image: bookmanager-api:latest
    container_name: bookmanager-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=bookmanager;Username=postgres;Password=postgres"
      Cors__AllowedOrigins__0: "http://localhost"
      Cors__AllowedOrigins__1: "http://localhost:4200"
    ports:
      - "5001:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/books || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bookmanager-net
    restart: on-failure

  frontend:
    build:
      context: ./front/book-manager
      dockerfile: Dockerfile
    image: bookmanager-front:latest
    container_name: bookmanager-front
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bookmanager-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  bookmanager-net:
    driver: bridge
